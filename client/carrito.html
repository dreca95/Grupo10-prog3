<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carrito - Mascotero</title>
  <link rel="stylesheet" href="/client/css/estilos.css" />
  <script src="/js/tema.js"></script>
  <link rel="stylesheet" href="/css/tema.css" />
</head>
<body>
  <div id="header"></div>

  <div class="container productosList cartContainer">
    <h2>Carrito</h2>

    <div id="contenido"></div>

    <div class="cartActions">
      <button id="btnComprar" type="button" class="primary">Comprar</button>
      <button id="btnCancelar" type="button" class="secondary">Cancelar</button>
    </div>
  </div>

  <script src="/client/js/include.js"></script>
  <script src="/client/js/utils.js"></script>
  <script src="/client/js/cart.js"></script>
  <script>
    __include("#header", "/client/partials/header.html").then(() => {
      __cart.updateCartBadge();
    });


    function render() {
      const cont = document.getElementById("contenido");
      const cart = __cart.loadCart();

      cont.replaceChildren();

      if (!cart.items.length) {
        const p = document.createElement("p");
        p.textContent = "No hay productos en el carrito.";
        cont.appendChild(p);
        return;
      }

      const total = __cart.getTotalPrice();

      const list = document.createElement("div");
      list.className = "cartList";
      list.id = "list";

      const summary = document.createElement("div");
      summary.className = "cartSummary";

      const summaryRow = document.createElement("div");
      summaryRow.className = "cartSummaryRow total";

      const lblTotal = document.createElement("span");
      lblTotal.textContent = "Total";

      const valTotal = document.createElement("span");
      valTotal.textContent = __utils.FormatearNumeroAPrecio(total);

      summaryRow.appendChild(lblTotal);
      summaryRow.appendChild(valTotal);
      summary.appendChild(summaryRow);

      cont.appendChild(list);
      cont.appendChild(summary);

      cart.items.forEach((it) => {
        const row = document.createElement("div");
        row.className = "cartItem";

        const thumb = document.createElement("div");
        thumb.className = "cartThumb";
        if (it.img) {
          const img = document.createElement("img");
          img.src = it.img;
          img.alt = it.nombre;
          img.onerror = function () {
            this.onerror = null;
            this.src = "/client/img/error.png";
          };
          thumb.appendChild(img);
        } else {
          const sin = document.createElement("div");
          sin.className = "sinImagenProducto";
          sin.textContent = "Sin imagen";
          thumb.appendChild(sin);
        }

        const info = document.createElement("div");
        info.className = "cartInfo";

        const titulo = document.createElement("h3");
        titulo.textContent = it.nombre;

        const desc = document.createElement("div");
        desc.className = "small";
        desc.textContent = it.descripcion || "";

        info.appendChild(titulo);
        info.appendChild(desc);

        const qty = document.createElement("div");
        qty.className = "cartQty";

        const btnRemove = document.createElement("button");
        btnRemove.type = "button";
        btnRemove.className = "qtyBtn remove";
        btnRemove.dataset.action = "remove";
        btnRemove.textContent = "-";

        const qtyVal = document.createElement("span");
        qtyVal.className = "qtyValue";
        qtyVal.textContent = String(it.cantidad);

        const btnAdd = document.createElement("button");
        btnAdd.type = "button";
        btnAdd.className = "qtyBtn";
        btnAdd.dataset.action = "add";
        btnAdd.textContent = "+";

        qty.appendChild(btnRemove);
        qty.appendChild(qtyVal);
        qty.appendChild(btnAdd);

        const priceWrap = document.createElement("div");
        priceWrap.className = "cartPrice";

        const priceFinal = document.createElement("div");
        priceFinal.className = "final";
        priceFinal.textContent = __utils.FormatearNumeroAPrecio((it.cantidad || 0) * (it.precio || 0));

        priceWrap.appendChild(priceFinal);

        const removeBtn = document.createElement("div");
        removeBtn.className = "cartRemove";
        removeBtn.title = "Quitar";
        removeBtn.textContent = "🗑";

        row.appendChild(thumb);
        row.appendChild(info);
        row.appendChild(qty);
        row.appendChild(priceWrap);
        row.appendChild(removeBtn);

        btnAdd.addEventListener("click", () => {
          __cart.addItem(it);
          render();
        });

        btnRemove.addEventListener("click", () => {
          __cart.removeItem(it.tipo, it.id);
          render();
        });

        removeBtn.addEventListener("click", () => {
          __cart.setQuantity(it.tipo, it.id, 0);
          render();
        });

        list.appendChild(row);
      });
    }

    document.getElementById("btnCancelar").addEventListener("click", () => {
      // cancelar = vaciar carrito y volver a productos
      __cart.clearCart();
      window.location.href = "/client/productos.html";
    });

    document.getElementById("btnComprar").addEventListener("click", async () => {
      const cart = __cart.loadCart();
      if (!cart.items.length) {
        alert("El carrito está vacío.");
        return;
      }

      const ok = confirm("¿Confirmás la compra?");
      if (!ok) return;

      const cliente = (localStorage.getItem("cliente_nombre") || "").trim();
      if (!cliente) {
        alert(
          "No se encontró tu nombre (cliente). Volvé a Inicio, ingresalo y luego comprá."
        );
        window.location.href = "/";
        return;
      }

      try {
        const payload = {
          cliente,
          items: cart.items.map((it) => ({
            id: it.id,
            tipo: it.tipo,
            nombre: it.nombre,
            precio: it.precio,
            cantidad: it.cantidad
          }))
        };

        const res = await fetch("/api/ventas", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(
            data.error ||
            "No se pudo confirmar la compra (revisá consola/server logs)"
          );
        }

        // limpiar carrito (autoservicio) y navegar al ticket
        __cart.clearCart();
        window.location.href = `/client/ticket.html?id=${encodeURIComponent(
          data.ventaId
        )}&token=${encodeURIComponent(data.token)}`;
      } catch (e) {
        alert(e.message);
      }
    });

    render();
  </script>
</body>

</html>
