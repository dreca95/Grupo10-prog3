<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accesorios - Mascotero</title>
  <link rel="stylesheet" href="/client/css/estilos.css" />
  <script src="/js/tema.js"></script>
  <link rel="stylesheet" href="/css/tema.css" />
</head>

<body>
  <div id="header"></div>

  <div class="container productosList">
    <h2>Accesorios</h2>

    <div class="backofficeBusquedaSeccion">
      <label for="buscarProducto">Buscar por nombre</label>
      <div class="backofficeBusquedaFila">
        <input type="search" id="buscarProducto" placeholder="Nombre del producto..." autocomplete="off" />
        <button type="button" id="buscarBtn" class="buscarBtn">Buscar</button>
        <button type="button" id="limpiarBtn" class="limpiarBusquedaBtn" hidden>Limpiar</button>
      </div>
    </div>

    <p id="sinCoincidencias" class="sinCoincidenciasBusqueda" hidden>No hay coincidencias.</p>

    <div id="grid" class="productosGrid"></div>

    <div class="pagination">
      <a id="prev" href="#" class="disabled">Anterior</a>
      <span id="pageText">Página 1</span>
      <a id="next" href="#">Siguiente</a>
    </div>
  </div>

  <script src="/client/js/include.js"></script>
  <script src="/client/js/utils.js"></script>
  <script src="/client/js/cart.js"></script>
  <script src="/client/js/paginado.js"></script>
  <script>
    __include("#header", "/client/partials/header.html").then(() => {
      __cart.updateCartBadge();
    });

    const catalogo = __paginado.iniciarCatalogo({
      apiUrl: "/api/accesorios",
      tipo: "accesorio",
      gridId: "grid",
      prevId: "prev",
      nextId: "next",
      pageTextId: "pageText",
      buscarInputId: "buscarProducto",
      buscarBtnId: "buscarBtn",
      limpiarBtnId: "limpiarBtn",
      sinCoincidenciasId: "sinCoincidencias"
    });

    window.addEventListener("load", () => {
      catalogo.cargarProductos();
    });
  </script>
</body>

</html>
