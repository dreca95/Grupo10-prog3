<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Productos - Mascotero</title>
  <link rel="stylesheet" href="/client/css/estilos.css" />
  <script src="/js/tema.js"></script>
  <link rel="stylesheet" href="/css/tema.css" />
</head>

<body>
  <div id="header"></div>

  <div class="container productos-container">
    <h2 id="bienvenidaTexto" style="margin: 0 0 18px 0;"></h2>

    <div class="categorias">
      <button type="button" class="categoria-btn" onclick="window.location.href='/client/alimentos.html'">
        Alimentos
      </button>
      <button type="button" class="categoria-btn" onclick="window.location.href='/client/accesorios.html'">
        Accesorios
      </button>
    </div>
  </div>

  <script src="/client/js/include.js"></script>
  <script src="/client/js/utils.js"></script>
  <script src="/client/js/cart.js"></script>
  <script>
    if (!__utils.requerirNombreCliente()) {
      throw new Error("redirect");
    }

    __include("#header", "/client/partials/header.html").then(() => {
      __cart.updateCartBadge();

      const nombre = __utils.obtenerNombreCliente();
      const el = document.getElementById("bienvenidaTexto");
      if (el && nombre) {
        el.replaceChildren();
        el.appendChild(document.createTextNode("Bienvenido, " + nombre + ". "));
        el.appendChild(document.createElement("br"));
        el.appendChild(document.createTextNode("Elegí una categoría"));
      } else if (el) {
        el.textContent = "Elegí una categoría";
      }
    });
  </script>
</body>

</html>
