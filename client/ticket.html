<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ticket - Mascotero</title>
  <link rel="stylesheet" href="/client/css/estilos.css" />
  <script src="/js/tema.js"></script>
  <link rel="icon" type="image/png" href="/img/favicon.png">
  <link rel="stylesheet" href="/css/tema.css" />
</head>

<body>
  <div id="header"></div>

  <div class="container productosList cartContainer">
    <h2>Ticket</h2>

    <div id="contenido"></div>

    <div class="cartActions">
      <button id="btnDescargar" type="button" class="primary">Descargar PDF</button>
      <button id="btnSalir" type="button" class="secondary">Salir</button>
    </div>
  </div>

  <script src="/client/js/include.js"></script>
  <script src="/client/js/utils.js"></script>
  <script src="/client/js/cart.js"></script>

  <script>
    __include("#header", "/client/partials/header.html").then(() => {
      __cart.updateCartBadge();
    });

    function filaResumen(etiqueta, valor, opciones) {
      const opts = opciones || {};
      const row = document.createElement("div");
      row.className = "cartSummaryRow" + (opts.total ? " total" : "");

      const izq = document.createElement("span");
      if (opts.etiquetaNegrita) {
        const strong = document.createElement("strong");
        strong.textContent = etiqueta;
        izq.appendChild(strong);
      } else {
        izq.textContent = etiqueta;
      }

      const der = document.createElement("span");
      der.textContent = valor;
      if (opts.estiloDer) {
        Object.assign(der.style, opts.estiloDer);
      }

      row.appendChild(izq);
      row.appendChild(der);
      return row;
    }

    async function cargarTicket() {
      const ventaId = __utils.obtenerQueryParam("id");
      const token = __utils.obtenerQueryParam("token");

      const cont = document.getElementById("contenido");
      if (!ventaId || !token) {
        cont.replaceChildren();
        const p = document.createElement("p");
        p.className = "error";
        p.textContent = "No se encontró el ticket.";
        cont.appendChild(p);
        document.getElementById("btnDescargar").disabled = true;
        return;
      }

      try {
        const res = await fetch(
          `/api/ventas/${ventaId}?token=${encodeURIComponent(token)}`
        );
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "No se pudo cargar la venta");

        const v = data.venta;
        const summary = document.createElement("div");
        summary.className = "cartSummary";

        summary.appendChild(filaResumen("Empresa", "MASCOTERO", { etiquetaNegrita: true }));
        summary.appendChild(filaResumen("Cliente", v.cliente, { etiquetaNegrita: true }));
        summary.appendChild(filaResumen("Fecha", __utils.formatearFechaHoraAR(v.fecha), { etiquetaNegrita: true }));
        summary.appendChild(filaResumen("Productos", v.descripcion, {
          etiquetaNegrita: true,
          estiloDer: { textAlign: "right", maxWidth: "520px" }
        }));
        summary.appendChild(filaResumen("Cantidad total", String(v.cantidad), { etiquetaNegrita: true }));
        summary.appendChild(filaResumen("Total", __utils.formatearNumeroAPrecio(v.precio), { total: true }));

        cont.replaceChildren();
        cont.appendChild(summary);

        document.getElementById("btnDescargar").addEventListener("click", () => {
          window.location.href = `/api/ventas/${ventaId}/ticket.pdf?token=${encodeURIComponent(token)}`;
        });
      } catch (e) {
        cont.replaceChildren();
        const p = document.createElement("p");
        p.className = "error";
        p.textContent = e.message;
        cont.appendChild(p);
        document.getElementById("btnDescargar").disabled = true;
      }
    }

    document.getElementById("btnSalir").addEventListener("click", () => {
      // autoservicio: reiniciar flujo
      localStorage.removeItem("cliente_nombre");
      __cart.clearCart();
      window.location.href = "/";
    });

    cargarTicket();
  </script>
</body>

</html>
