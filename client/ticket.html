<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Ticket - Mascotero</title>
  <link rel="stylesheet" href="/client/css/estilos.css" />
</head>

<body>
  <div id="header"></div>

  <div class="container productosList cartContainer">
    <h2>Ticket</h2>

    <div id="contenido"></div>

    <div class="cartActions">
      <button id="btnDescargar" type="button" class="primary">Descargar PDF</button>
      <button id="btnSalir" type="button" class="secondary">Salir</button>
    </div>
  </div>

  <script src="/client/js/include.js"></script>
  <script src="/client/js/utils.js"></script>
  <script src="/client/js/cart.js"></script>

  <script>
    __include("#header", "/client/partials/header.html").then(() => {
      __cart.updateCartBadge();
    });

    async function cargarTicket() {
      const ventaId = __utils.ObtenerQueryParam("id");
      const token = __utils.ObtenerQueryParam("token");

      const cont = document.getElementById("contenido");
      if (!ventaId || !token) {
        cont.innerHTML = "<p class='error'>No se encontró el ticket.</p>";
        document.getElementById("btnDescargar").disabled = true;
        return;
      }

      try {
        const res = await fetch(`/api/ventas/${ventaId}`);
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || "No se pudo cargar la venta");

        const v = data.venta;
        cont.innerHTML = `
            <div class="cartSummary">
              <div class="cartSummaryRow"><span><strong>Empresa</strong></span><span>MASCOTERO</span></div>
              <div class="cartSummaryRow"><span><strong>Cliente</strong></span><span>${v.cliente}</span></div>
              <div class="cartSummaryRow"><span><strong>Fecha</strong></span><span>${__utils.FormatearFechaHoraAR(v.fecha)}</span></div>
              <div class="cartSummaryRow"><span><strong>Productos</strong></span><span style="text-align:right; max-width: 520px;">${v.descripcion}</span></div>
              <div class="cartSummaryRow"><span><strong>Cantidad total</strong></span><span>${v.cantidad}</span></div>
              <div class="cartSummaryRow total"><span>Total</span><span>${__utils.FormatearNumeroAPrecio(v.precio)}</span></div>
            </div>
          `;

        document.getElementById("btnDescargar").addEventListener("click", () => {
          // descarga real desde el servidor (Puppeteer), protegido por token temporal
          window.location.href = `/api/ventas/${ventaId}/ticket.pdf?token=${encodeURIComponent(token)}`;
        });
      } catch (e) {
        cont.innerHTML = `<p class="error">${e.message}</p>`;
        document.getElementById("btnDescargar").disabled = true;
      }
    }

    document.getElementById("btnSalir").addEventListener("click", () => {
      // autoservicio: reiniciar flujo
      localStorage.removeItem("cliente_nombre");
      __cart.clearCart();
      window.location.href = "/";
    });

    cargarTicket();
  </script>
</body>

</html>
